<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escolher o seu nicho — anti designer pato</title>
<link rel="icon" type="image/png" href="/shared/favicon.png">
<style>
@font-face{font-family:Vinila;src:url(/shared/fonts/vinila-400-normal.woff2) format("woff2");font-weight:400;font-display:swap}
@font-face{font-family:Vinila;src:url(/shared/fonts/vinila-700-normal.woff2) format("woff2");font-weight:700;font-display:swap}

:root{
  --surface:#f1f1f1;
  --card:transparent;
  --soft:#e6e6e8;
  --line:#d4d4d8;
  --ink:#18181b;
  --muted:#71717a;
  --faint:#a1a1aa;
  --lime:#e7f99a;
  --pink:#ff00d7;
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Vinila,-apple-system,"Segoe UI",system-ui,sans-serif;
  background:var(--surface);color:var(--ink);
  font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

/* ---------- topbar ---------- */
.top{
  height:60px;background:var(--surface);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;position:sticky;top:0;z-index:20;
}
.top .back{display:flex;align-items:center;gap:12px;font-weight:700;font-size:16px}
.top .back .bk{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;color:var(--muted)}
.top .back .bk:hover{background:var(--soft);color:var(--ink)}
.top .back .bk svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.top .tools{display:flex;align-items:center;gap:4px}
.iconbtn{width:38px;height:38px;border-radius:999px;display:grid;place-items:center;color:var(--muted)}
.iconbtn:hover{background:var(--soft);color:var(--ink)}
.iconbtn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ---------- shell ---------- */
.shell{display:flex;align-items:stretch;height:calc(100vh - 60px)}
.player{flex:1;min-width:0;overflow-y:auto;padding:44px clamp(24px,4vw,64px) 60px}
.player .inner{max-width:900px;margin:0 auto}

.eyebrow{font-size:13.5px;color:var(--muted);margin-bottom:8px}
.lhead{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:26px}
.lhead h1{font-size:30px;font-weight:700;letter-spacing:-.02em}
.nav{display:flex;gap:8px}
.nav a{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;color:var(--ink)}
.nav a:hover{background:var(--soft)}
.nav a.off{color:var(--faint);pointer-events:none;opacity:.55}
.nav a svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* video poster */
.video{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:16/9;background:#101010}
.poster{position:absolute;inset:0;padding:36px 40px;display:flex;flex-direction:column;color:#fff}
.poster .topline{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.04em;color:rgba(255,255,255,.72);text-transform:uppercase}
.poster .mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px}
.poster .pills{display:flex;gap:10px}
.poster .pill{border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:5px 15px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.poster h2{font-size:clamp(34px,5vw,58px);font-weight:700;line-height:.98;letter-spacing:-.03em;text-transform:uppercase}
.poster .tag{color:var(--lime);font-size:clamp(15px,1.8vw,20px);font-weight:400}
.play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:78px;height:78px;border-radius:999px;border:1.5px solid rgba(255,255,255,.55);
  background:rgba(255,255,255,.14);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:grid;place-items:center;cursor:pointer;transition:transform .16s,background .16s}
.play:hover{transform:translate(-50%,-50%) scale(1.06);background:rgba(255,255,255,.26)}
.play svg{width:26px;height:26px;fill:#fff;margin-left:4px}
.ctrls{position:absolute;left:0;right:0;bottom:0;height:44px;display:flex;align-items:center;gap:14px;padding:0 16px;background:linear-gradient(0deg,rgba(0,0,0,.5),transparent)}
.ctrls svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ctrls .time{color:#fff;font-size:12px}
.ctrls .track{flex:1;height:3px;border-radius:999px;background:rgba(255,255,255,.3);position:relative}
.ctrls .track i{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--pink);border-radius:999px}
.ctrls .spacer{flex:1}

/* corpo da aula */
.lbody{margin-top:38px}
.lbody h3{font-size:19px;font-weight:700;letter-spacing:-.01em;margin:0 0 12px}
.lbody h3+h3{margin-top:34px}
.lbody p{font-size:15.5px;line-height:1.7;color:#3f3f46;margin:0 0 14px;max-width:820px}
.lbody p:last-child{margin-bottom:0}
.lbody .sec{margin-top:36px}

.exercise{margin-top:36px;border:1px solid var(--line);border-radius:var(--r);padding:24px 26px}
.exercise .xtag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.exercise h3{margin-bottom:10px}
.exercise ol{margin:14px 0 0;padding-left:20px}
.exercise li{font-size:15.5px;line-height:1.65;color:#3f3f46;margin-bottom:6px}
.exercise .xrow{margin-top:22px;padding-top:20px;border-top:1px solid var(--line);display:flex;align-items:flex-end;gap:24px}
.exercise .critwrap{flex:1;min-width:0}
.exercise .critlbl{font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:12px}
.exercise .crit{display:flex;flex-wrap:wrap;gap:8px}
.exercise .crit span{font-size:13px;font-weight:700;border:1px solid var(--line);border-radius:8px;padding:7px 14px}
.exercise .go{flex:none;display:flex;align-items:center;font-weight:700;font-size:14.5px;padding:12px 24px;border-radius:999px;background:var(--pink);color:#fff}

.materials{margin-top:36px}
.materials .mrow{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px}
.materials .mrow:hover{background:var(--soft)}
.materials .mrow .fi{width:34px;height:34px;border-radius:8px;background:var(--soft);display:grid;place-items:center;flex:none}
.materials .mrow .fi svg{width:17px;height:17px;fill:none;stroke:var(--ink);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.materials .mrow>div{flex:1;min-width:0}
.materials .mrow .fn{font-weight:700;font-size:14px}
.materials .mrow .fm{font-size:12.5px;color:var(--muted)}
.materials .mrow .dl{width:20px;height:20px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.done-wrap{display:flex;justify-content:center;margin-top:48px;padding-top:40px;border-top:1px solid var(--line)}
.btn-done{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:14.5px;padding:12px 26px;border-radius:999px;border:1px solid var(--line);background:var(--card)}
.btn-done:hover{background:var(--soft)}
.btn-done .ck{width:20px;height:20px;border-radius:999px;background:var(--lime);display:grid;place-items:center;flex:none}
.btn-done .ck svg{width:11px;height:11px;fill:none;stroke:var(--ink);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
/* próximo passo — centralizado; botão vira rosa+check quando concluído */
.nextstep{margin-top:34px;display:flex;flex-direction:column;gap:14px;align-items:center;text-align:center}
.nextstep .ns-kicker{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.ns-toggle{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:15px;padding:13px 28px;border-radius:999px;border:1.5px solid var(--line);color:var(--ink);background:none;transition:background .15s,border-color .15s,color .15s}
.ns-toggle:hover{background:var(--soft)}
.ns-toggle.done{background:var(--pink);border-color:var(--pink);color:#fff}
.ns-toggle.done:hover{filter:brightness(1.06);background:var(--pink)}
.ns-toggle .ck{display:none;align-items:center}
.ns-toggle.done .ck{display:inline-flex}
.ns-toggle .ck svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.nextstep .ns-next{font-size:14px;color:var(--muted);font-weight:700}
.nextstep .ns-next:hover{color:var(--ink)}
/* aplique aqui (bloco do Canvas embaixo do vídeo) */
.applyhere{position:relative;margin-top:44px;border:1px solid var(--line);border-radius:var(--r);padding:26px 24px 22px}
.applyhere .ah-tag{position:absolute;top:-12px;left:22px;display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);color:var(--ink);font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:5px 11px;border-radius:8px}
.applyhere .ah-tag svg{stroke:var(--ink)}
.applyhere h3{font-size:18px;font-weight:700;margin-top:7px;letter-spacing:-.01em}
.applyhere .ah-sub{font-size:14.5px;color:#3f3f46;margin-top:8px;line-height:1.6;max-width:820px}
.applyhere ol{margin:12px 0 0;padding-left:20px}
.applyhere ol li{font-size:14.5px;line-height:1.6;color:#3f3f46;margin-bottom:5px}
.applyhere .ah-crit{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.applyhere .ah-crit .cl{width:100%;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:2px}
.applyhere .ah-crit span:not(.cl){font-size:13px;font-weight:700;border:1px solid var(--line);border-radius:8px;padding:7px 14px}
.applyhere .ah-fields{margin-top:20px;padding-top:20px;border-top:1px solid var(--line)}

/* ---------- painel de aulas ---------- */
.panel{width:360px;flex:none;border-left:1px solid var(--line);display:flex;flex-direction:column;background:var(--surface)}
.panel .phead{height:58px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line)}
.panel .phead h3{font-size:17px;font-weight:700}
.panel .plist{flex:1;overflow-y:auto;padding:8px 0 24px}
.mod{border-top:1px solid var(--line)}
.mod:first-child{border-top:0}
.mod .mtitle{display:flex;align-items:flex-start;gap:10px;padding:16px 20px 10px;font-weight:700;font-size:14px;line-height:1.3}
.mod .mtitle svg{width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none;margin-top:3px}
.li{display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:14px;color:var(--muted)}
.li:hover{background:var(--soft)}
.li.on{background:var(--soft);color:var(--ink);font-weight:700}
.li .st{width:19px;height:19px;flex:none;border-radius:999px;display:grid;place-items:center}
.li .st.done{background:var(--lime)}
.li .st.done svg{width:10px;height:10px;fill:none;stroke:var(--ink);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.li .st.now{background:var(--pink)}
.li .st.now svg{width:9px;height:9px;fill:#fff;margin-left:1px}
.li .st.lock{border:1.5px solid var(--line)}
.li .st.lock svg{width:9px;height:9px;fill:none;stroke:var(--faint);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.li.lock{color:var(--faint)}
.li .tt{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* painel de aulas — preto, e fechável pelo X */
.panel{background:#101010;border-left:1px solid #101010}
.panel.hidden{display:none}
.panel .phead{border-bottom:1px solid rgba(255,255,255,.1)}
.panel .phead h3{color:#fff}
.panel .phead .iconbtn{color:rgba(255,255,255,.55)}
.panel .phead .iconbtn:hover{background:rgba(255,255,255,.1);color:#fff}
.panel .mod{border-top:1px solid rgba(255,255,255,.08)}
.panel .mod .mtitle{color:#fff}
.panel .mod .mtitle svg{stroke:rgba(255,255,255,.5)}
.panel .li{color:rgba(255,255,255,.55)}
.panel .li:hover{background:rgba(255,255,255,.06)}
.panel .li.on{background:rgba(255,255,255,.08);color:#fff}
.panel .li .st.lock{border-color:rgba(255,255,255,.25)}
.panel .li .st.lock svg{stroke:rgba(255,255,255,.4)}

@media(max-width:1000px){
  .panel{position:fixed;top:0;right:0;bottom:0;width:min(360px,86vw);z-index:60;transform:translateX(100%);transition:transform .22s ease}
  .panel.hidden{display:flex;transform:translateX(100%)}
  .panel:not(.hidden){transform:translateX(0);box-shadow:-24px 0 48px rgba(0,0,0,.4)}
}

/* ---------- Escavador (chat da Aula 1 / VOCÊ) ---------- */
.esc .gone{display:none}
.esc-log{display:flex;flex-direction:column;gap:10px;max-height:380px;overflow-y:auto;padding:4px 2px 8px}
.esc-b{font-size:15px;line-height:1.55;white-space:pre-wrap}
.esc-b.ai{align-self:stretch;max-width:100%;background:none;border:none;padding:2px 0;color:var(--ink)}
.esc-b.me{align-self:flex-end;max-width:82%;background:var(--ink);color:#fff;padding:10px 14px;border-radius:14px;border-bottom-right-radius:5px;font-size:14.5px}
.esc-typing{font-size:13px;color:var(--muted);padding:6px 2px}
.esc-typing.gone{display:none}
.esc-spin{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:aspin .7s linear infinite;vertical-align:-1px;margin-right:7px}
@keyframes aspin{to{transform:rotate(360deg)}}
.esc-head{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.esc-head .dot{width:8px;height:8px;border-radius:999px;background:var(--pink);flex:none}
.esc-head .nm{font-weight:700;font-size:13.5px;color:var(--ink)}
.esc-head .sb{font-size:12.5px;color:var(--muted)}
.esc-input{margin-top:16px}
.esc-input textarea{width:100%;border:none;border-radius:12px;background:#fff;padding:14px 16px;font:inherit;font-size:14.5px;resize:none;min-height:56px;max-height:160px;line-height:1.5;color:var(--ink);box-shadow:0 1px 2px rgba(16,16,16,.04)}
.esc-input textarea::placeholder{color:var(--faint)}
.esc-input textarea:focus{outline:none}
.esc-sendrow{display:flex;justify-content:flex-end;margin-top:10px}
.esc-send{background:var(--pink);color:#fff;font-weight:700;font-size:14px;padding:11px 28px;border-radius:999px;cursor:pointer}
.esc-send:hover{filter:brightness(1.06)}
.esc-send[disabled]{opacity:.5;cursor:not-allowed}
.esc-prev{margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.esc-prev.gone{display:none}
.esc-prev h4{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:4px}
.esc-prog{font-size:12.5px;color:var(--muted);margin:0 0 12px}
.esc-card{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:13.5px;line-height:1.45;background:#fff}
.esc-card b{font-weight:700}
.esc-card .cw{color:var(--muted);font-size:12px;margin-top:3px}
.esc-gate{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.esc-gate.gone{display:none}
.esc-gate .gp{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.esc-gate .gp.g-critico{background:var(--ink);color:#fff;border-color:var(--ink)}
.esc-gate .gp.g-importante,.esc-gate .gp.g-aviso{background:rgba(255,0,215,.08);color:var(--ink);border-color:var(--pink)}
.esc-gate .gp.g-ok{background:var(--lime);color:var(--ink);border-color:var(--lime)}
.esc-gate .gv{font-size:12.5px;color:var(--muted)}
.esc-cont{margin-left:auto;font-weight:700;font-size:14px;padding:10px 20px;border-radius:999px;background:var(--pink);color:#fff}
</style>
</head>
<body>

<header class="top">
  <div class="back">
    <a class="bk" href="home.html" aria-label="Voltar"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></a>
    De Genérico a Especialista
  </div>
  <div class="tools">
    <button class="iconbtn" aria-label="Comentários"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg></button>
    <button class="iconbtn" aria-label="Anotações"><svg viewBox="0 0 24 24"><path d="M4 4h16v12H8l-4 4z"/><path d="M8 9h8M8 12h5"/></svg></button>
    <button class="iconbtn" aria-label="Salvar"><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4z"/></svg></button>
    <button class="iconbtn" aria-label="Mostrar/ocultar aulas" onclick="document.querySelector('.panel').classList.toggle('hidden')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg></button>
  </div>
</header>

<div class="shell">
  <main class="player">
    <div class="inner" id="lessonRoot">
      <p class="eyebrow" style="color:var(--muted)">Carregando aula…</p>
    </div>
  </main>

  <aside class="panel">
    <div class="phead">
      <h3>Aulas</h3>
      <button class="iconbtn" aria-label="Fechar aulas" onclick="document.querySelector('.panel').classList.add('hidden')"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="plist">
      <div class="mod">
        <div class="mtitle"><svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>Trilha do posicionamento</div>
        <div id="panelList"></div>
      </div>
    </div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/app/config.js"></script>
<script src="/app/curso/guard.js"></script>
<script src="/app/curso/api.js"></script>
<script src="/app/curso/canvas-blocks.js"></script>
<script src="/app/curso/ui.js"></script>
<script>
(function(){
  var ICON_DONE='<svg viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg>';
  var ICON_PLAY='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  function esc(s){return String(s==null?'':s).replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];});}
  function qs(k){return new URLSearchParams(location.search).get(k);}

  var LESSONS=[], DONE=new Set(), LIB=null, cur=null, idx=-1, CANVAS={};

  function videoHTML(l){
    var lib = l.video_library || LIB;
    if(l.video_id && lib){
      var src='https://iframe.mediadelivery.net/embed/'+encodeURIComponent(lib)+'/'+encodeURIComponent(l.video_id)+'?autoplay=false&preload=true&responsive=true';
      return '<div class="video"><iframe src="'+src+'" loading="lazy" style="border:0;position:absolute;inset:0;width:100%;height:100%" allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;" allowfullscreen></iframe></div>';
    }
    // sem vídeo ainda -> pôster "em breve"
    var num=(idx+1<10?'0':'')+(idx+1);
    return '<div class="video"><div class="poster">'
      +'<div class="topline"><span>De Genérico a Especialista<br>c/ Rodrigo Bondioli</span><span>anti designer pato</span></div>'
      +'<div class="mid"><div class="pills"><span class="pill">Curso</span><span class="pill">Aula '+num+'</span></div>'
      +'<h2>'+esc(l.title)+'</h2>'
      +(l.tagline?'<p class="tag">'+esc(l.tagline)+'</p>':'')
      +'<p class="tag" style="opacity:.7;font-size:13px">vídeo em breve</p></div></div></div>';
  }

  function exerciseHTML(ex, l){
    if(!ex || (!ex.title && !ex.intro && !(ex.steps&&ex.steps.length))) return '';
    var steps = (ex.steps&&ex.steps.length)? '<ol>'+ex.steps.map(function(s){return '<li>'+esc(s)+'</li>';}).join('')+'</ol>':'';
    var crit='';
    if(ex.criteria&&ex.criteria.length){
      crit='<div class="critwrap"><div class="critlbl">'+esc(ex.criteria_label||'Critérios')+'</div><div class="crit">'
        +ex.criteria.map(function(c){return '<span>'+esc(c)+'</span>';}).join('')+'</div></div>';
    }
    var xrow = crit? '<div class="xrow">'+crit+'</div>':'';
    return '<div class="exercise">'
      +'<span class="xtag"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Exercício</span>'
      +(ex.title?'<h3>'+esc(ex.title)+'</h3>':'')
      +(ex.intro?'<p>'+esc(ex.intro)+'</p>':'')
      +steps+xrow+'</div>';
  }

  // card único: exercício (o que fazer) + os campos do Canvas, inline. Assiste, aplica, salva.
  function applyHereHTML(l){
    if(l.canvas_block==null || !window.ADP_CANVAS) return '';
    var def = window.ADP_CANVAS.byBlock(l.canvas_block);
    if(!def) return '';
    var ex = l.exercise||{};
    // bloco 0 (VOCÊ) é conversa, não formulário — ignora a copy antiga do banco ("4 perguntas")
    if(l.canvas_block===0){ ex = { title:'Sobre você', intro:'Nada de formulário. É uma conversa: o Escavador puxa tua história e vai montando teu bloco VOCÊ — é daqui que o teu nicho sai.' }; }
    var steps = (ex.steps&&ex.steps.length)? '<ol>'+ex.steps.map(function(s){return '<li>'+esc(s)+'</li>';}).join('')+'</ol>':'';
    var crit='';
    if(ex.criteria&&ex.criteria.length){
      crit='<div class="ah-crit"><span class="cl">'+esc(ex.criteria_label||'Critérios')+'</span>'
        +ex.criteria.map(function(c){return '<span>'+esc(c)+'</span>';}).join('')+'</div>';
    }
    var title = ex.title || ('Bloco '+l.canvas_block+' — '+def.title);
    return '<div class="applyhere">'
      +'<span class="ah-tag"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Exercício</span>'
      +'<h3>'+esc(title)+'</h3>'
      +(ex.intro?'<p class="ah-sub">'+esc(ex.intro)+'</p>':'')
      +steps+crit
      +'<div class="ah-fields">'+(l.canvas_block===0?'':'<p style="font-size:12.5px;color:var(--muted);margin:0 0 4px">O que você escreve aqui já entra no seu Canvas e salva sozinho.</p>')+'<div id="canvasInline"></div></div>'
      +'</div>';
  }

  function materialsHTML(mats){
    if(!mats||!mats.length) return '';
    var rows=mats.map(function(m){
      var href=m.url||'#';
      return '<a class="mrow" href="'+esc(href)+'"'+(/^https?:/.test(href)?' target="_blank" rel="noopener"':'')+'>'
        +'<span class="fi"><svg viewBox="0 0 24 24"><path d="M14 3v5h5"/><path d="M14 3H6v18h12V8z"/></svg></span>'
        +'<div><div class="fn">'+esc(m.label||'Material')+'</div>'+(m.meta?'<div class="fm">'+esc(m.meta)+'</div>':'')+'</div>'
        +'<svg class="dl" viewBox="0 0 24 24"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg></a>';
    }).join('');
    return '<div class="materials"><h3 style="font-size:19px;font-weight:700;margin:0 0 14px">Materiais da aula</h3>'+rows+'</div>';
  }

  function descHTML(desc){
    if(!desc) return '';
    var paras=String(desc).split(/\n\s*\n/).map(function(p){return '<p>'+esc(p.trim()).replace(/\n/g,'<br>')+'</p>';}).join('');
    return '<div class="lbody"><h3>Sobre a aula</h3>'+paras+'</div>';
  }

  // 🛠️ Escavador — chat da Aula 1 (bloco 0/VOCÊ). Cliente guarda o estado (voce + history); Gate 1 oficial = gateForBlock(0,voce).
  function mountEscavador(container){
    var voce = CANVAS[0] || {};
    var history = Array.isArray(voce._chat) ? voce._chat.slice() : [];
    container.innerHTML = '<div class="esc">'
      + '<div class="esc-head"><span class="dot"></span><span class="nm">O Escavador</span><span class="sb">vai montando teu bloco VOCÊ</span></div>'
      + '<div class="esc-log" id="escLog"></div>'
      + '<div class="esc-typing gone" id="escTyping"><span class="esc-spin"></span>O Escavador está pensando…</div>'
      + '<div class="esc-input"><textarea id="escInput" placeholder="Responde aqui… (Enter envia · Shift+Enter quebra linha)"></textarea><div class="esc-sendrow"><button class="esc-send" id="escSend">Enviar</button></div></div>'
      + '<div class="esc-prev gone" id="escPrev"></div>'
      + '<div class="esc-gate gone" id="escGate"></div>'
      + '</div>';
    var log=container.querySelector('#escLog'), input=container.querySelector('#escInput'),
        send=container.querySelector('#escSend'), typing=container.querySelector('#escTyping'),
        prev=container.querySelector('#escPrev'), gate=container.querySelector('#escGate');

    function bubble(role, text){ var d=document.createElement('div'); d.className='esc-b '+(role==='assistant'?'ai':'me'); d.textContent=text||''; log.appendChild(d); log.scrollTop=log.scrollHeight; }
    function setBusy(b){ send.disabled=b; typing.classList.toggle('gone', !b); }
    function count(a, f){ return (a||[]).filter(f).length; }

    function renderPreview(){
      var v=voce||{}, parts=[];
      (v.comunidades||[]).forEach(function(c){ if(c&&c.nome) parts.push('<div class="esc-card"><b>Comunidade:</b> '+esc(c.nome)+(c.problema?' — '+esc(c.problema):'')+(c.evidencia?'<div class="cw">evidência: '+esc(c.evidencia)+'</div>':'')+'</div>'); });
      (v.competencias||[]).forEach(function(c){ if(c&&c.o_que) parts.push('<div class="esc-card"><b>Competência:</b> '+esc(c.o_que)+(c.exemplo?' <span class="cw">('+esc(c.exemplo)+')</span>':'')+'</div>'); });
      (v.provas||[]).forEach(function(p){ if(p&&(p.situacao||p.acao||p.consequencia)) parts.push('<div class="esc-card"><b>Prova:</b> '+[p.situacao,p.acao,p.consequencia].filter(Boolean).map(esc).join(' → ')+'</div>'); });
      if(v.historia) parts.push('<div class="esc-card"><b>História:</b> '+esc(v.historia)+'</div>');
      var pr=v.preferencias||{}; if((pr.ama&&pr.ama.length)||(pr.odeia&&pr.odeia.length)) parts.push('<div class="esc-card"><b>Ama:</b> '+esc((pr.ama||[]).join(', '))+' · <b>Odeia:</b> '+esc((pr.odeia||[]).join(', '))+'</div>');
      if(v.medos) parts.push('<div class="esc-card"><b>Medo:</b> '+esc(v.medos)+'</div>');
      if(!parts.length){ prev.classList.add('gone'); return; }
      var prog='Comunidades: '+count(v.comunidades,function(c){return c&&c.nome;})
        +' · Competências: '+count(v.competencias,function(c){return c&&c.o_que;})
        +' · Provas: '+count(v.provas,function(p){return p&&(p.situacao||p.acao||p.consequencia);})
        +' · História: '+(v.historia?'ok':'–')+' · Medo: '+(v.medos?'ok':'–');
      prev.innerHTML='<h4>Seu bloco VOCÊ, montando</h4><div class="esc-prog">'+prog+'</div>'+parts.join('');
      prev.classList.remove('gone');
    }
    function renderGate(){
      var g=window.ADP_CANVAS.gateForBlock(0, voce);
      if(!g.preenchido){ gate.classList.add('gone'); return; }
      var next=(LESSONS[idx+1]) ? ('aula.html?a='+LESSONS[idx+1].id) : 'canvas.html';
      var sev=(g.gate.sev==='nenhum')?'aviso':g.gate.sev;
      var label=(g.gate.sev==='nenhum')?'em andamento':esc(g.gate.label);
      gate.innerHTML='<span class="gp g-'+sev+'">Gate: '+label+'</span><span class="gv">Validação: hipótese</span>'
        +'<a class="esc-cont" href="'+next+'">Continuar para Território →</a>';
      gate.classList.remove('gone');
    }
    function persist(){ voce._chat=history.slice(-24); CANVAS[0]=voce; window.ADP.saveBlock(0, voce).catch(function(){}); }

    async function turn(userText){
      if(userText){ history.push({role:'user', content:userText}); bubble('user', userText); }
      setBusy(true);
      try{
        var r=await window.ADP.escavador({ history: history.slice(-8), voce: voce });
        var d=(r&&r.data)?r.data:r;
        if(d && d.voce) voce=d.voce;
        history.push({role:'assistant', content:d.reply});
        bubble('assistant', d.reply);
        renderPreview(); renderGate(); persist();
      }catch(e){ bubble('assistant', 'Deu ruim aqui ('+(e.message||'erro')+'). Manda de novo.'); }
      setBusy(false);
    }
    function submit(){ var t=input.value.trim(); if(!t) return; input.value=''; turn(t); }
    send.addEventListener('click', submit);
    input.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); submit(); } });

    history.forEach(function(m){ bubble(m.role, m.content); });
    renderPreview(); renderGate();
    if(!history.length){ turn(null); } // abertura do Escavador
  }

  function renderLesson(){
    var l=cur, total=LESSONS.length;
    var prev=idx>0?LESSONS[idx-1]:null, next=idx<total-1?LESSONS[idx+1]:null;
    var isDone=DONE.has(l.id);
    document.title=(l.title||'Aula')+' — anti designer pato';
    var nav='<div class="nav">'
      +(prev?'<a href="aula.html?a='+prev.id+'" aria-label="Aula anterior">':'<a class="off" aria-label="Aula anterior">')+'<svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></a>'
      +(next?'<a href="aula.html?a='+next.id+'" aria-label="Próxima aula">':'<a class="off" aria-label="Próxima aula">')+'<svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></a>'
      +'</div>';
    document.getElementById('lessonRoot').innerHTML =
      '<p class="eyebrow">Aula '+(idx+1)+' de '+total+'</p>'
      +'<div class="lhead"><h1>'+esc(l.title)+'</h1>'+nav+'</div>'
      +videoHTML(l)
      +descHTML(l.description)
      +(l.canvas_block!=null ? applyHereHTML(l) : exerciseHTML(l.exercise,l))
      +materialsHTML(l.materials)
      +'<div id="nextStepWrap"></div>';

    var ci=document.getElementById('canvasInline');
    if(ci && window.ADP_CANVAS && l.canvas_block!=null){
      if(l.canvas_block===0){ mountEscavador(ci); }
      else window.ADP_CANVAS.renderBlock(ci, l.canvas_block, CANVAS[l.canvas_block]||{}, function(b,data){ CANVAS[b]=data; },
        { getNicho:function(){ return window.ADP_CANVAS.nichoFromBlock2(CANVAS[2]); } });
    }
    paintNextStep();
    renderPanel();
  }

  // "Seu próximo passo" — sempre óbvio. Calibrado: guia, nunca trava.
  function buildNextStep(){
    var total=LESSONS.length;
    var next=idx<total-1?LESSONS[idx+1]:null;
    var isDone=DONE.has(cur.id);
    var nextHref = next? ('aula.html?a='+next.id) : 'posicionamento.html';
    var nextLabel = next? ('Próxima aula: '+esc(next.title)) : 'Montar meu posicionamento com a IA';
    var kicker = isDone ? '' : '<div class="ns-kicker">Aplicou o exercício acima? Salva o progresso</div>';
    var btn = '<button class="ns-toggle'+(isDone?' done':'')+'" id="doneBtn"><span class="ck">'+ICON_DONE+'</span>'+(isDone?'Concluída':'Marcar aula como concluída')+'</button>';
    var link = '<a class="ns-next" href="'+nextHref+'">'+(isDone? (nextLabel+' →') : 'ou pular pra próxima →')+'</a>';
    return '<div class="nextstep">'+kicker+btn+link+'</div>';
  }
  function paintNextStep(){
    var w=document.getElementById('nextStepWrap'); if(!w) return;
    w.innerHTML=buildNextStep();
    var b=document.getElementById('doneBtn'); if(b) b.addEventListener('click', toggleDone);
  }

  function renderPanel(){
    document.getElementById('panelList').innerHTML = LESSONS.map(function(l,i){
      var isDone=DONE.has(l.id), on=(l.id===cur.id);
      var st = isDone? '<span class="st done">'+ICON_DONE+'</span>'
             : on ?    '<span class="st now">'+ICON_PLAY+'</span>'
             :         '<span class="st lock" style="border-color:var(--line)"><svg viewBox="0 0 24 24" style="width:8px;height:8px"><circle cx="12" cy="12" r="6" fill="#a1a1aa"/></svg></span>';
      return '<a class="li'+(on?' on':'')+'" href="aula.html?a='+l.id+'">'+st+'<span class="tt">'+esc(l.title)+'</span></a>';
    }).join('');
  }

  async function toggleDone(){
    var willBe=!DONE.has(cur.id);
    if(willBe){DONE.add(cur.id);} else {DONE.delete(cur.id);}
    paintNextStep();
    renderPanel();
    if(willBe){ var nx=document.querySelector('.ns-next'); if(nx) nx.focus(); } // fecha o loop no "próxima aula →"
    try{ await window.ADP.setDone(cur.id, willBe); }
    catch(e){ if(willBe){DONE.delete(cur.id);}else{DONE.add(cur.id);} paintNextStep(); renderPanel(); }
  }

  var RETRYBTN='<button id="retryBtn" style="margin-top:14px;font-family:inherit;font-weight:700;font-size:14px;padding:10px 20px;border-radius:999px;border:1.5px solid var(--ink);background:none;color:var(--ink);cursor:pointer">Tentar de novo</button>';
  function showBootError(inner){
    var root=document.getElementById('lessonRoot'); root.innerHTML=inner;
    var rb=document.getElementById('retryBtn'); if(rb) rb.addEventListener('click', boot);
  }
  async function boot(){
    if(!window.ADP || window.ADP.devMode){ document.getElementById('lessonRoot').innerHTML='<p class="eyebrow">Você precisa entrar pra ver a aula.</p><a href="/" style="display:inline-block;margin-top:12px;font-weight:700;text-decoration:underline">Entrar →</a>'; return; }
    try{
      // aulas, progresso e canvas em PARALELO (antes eram 3 round-trips em série)
      var res=await Promise.all([
        window.ADP.lessons(),
        window.ADP.progress().catch(function(){return {done:[]};}),
        window.ADP.loadCanvas().catch(function(){return [];})
      ]);
      LESSONS=res[0].lessons||[]; LIB=res[0].library;
      DONE=new Set(res[1].done||[]);
      (res[2]||[]).forEach(function(r){ if(r && r.block!=null) CANVAS[r.block]=r.data||{}; });
      if(!LESSONS.length){ document.getElementById('lessonRoot').innerHTML='<p class="eyebrow">Nenhuma aula publicada ainda.</p>'; return; }
      var want=qs('a');
      idx = want? LESSONS.findIndex(function(l){return l.id===want;}) : -1;
      if(idx<0){ idx = LESSONS.findIndex(function(l){return !DONE.has(l.id);}); if(idx<0) idx=0; }
      cur=LESSONS[idx];
      renderLesson();
    }catch(e){
      showBootError('<p class="eyebrow">Não consegui carregar a aula agora.</p>'+RETRYBTN);
    }
  }
  // no mobile o painel de aulas começa fechado (drawer)
  if(window.matchMedia('(max-width:1000px)').matches){ var _p=document.querySelector('.panel'); if(_p) _p.classList.add('hidden'); }
  boot();
})();
</script>
</body>
